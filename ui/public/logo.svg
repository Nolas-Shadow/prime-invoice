<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="45" fill="url(#grad1)" />
  
  <!-- P letter -->
  <text x="60" y="75" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="white" text-anchor="middle">P</text>
  
  <!-- Prime text -->
  <text x="115" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Prime</text>
  
  <!-- Invoice text -->
  <text x="115" y="80" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#grad2)">Invoice</text>
  
  <!-- Tagline -->
  <text x="205" y="105" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">DeFi Invoice Factoring</text>
</svg>
